# ============================================
# Development Docker Compose Configuration
# ============================================
# This sets up local development infrastructure:
# - PostgreSQL 17 (with data persistence)
# - Redis (for caching/sessions)
#
# The actual apps (API, Web) run outside Docker in dev mode
# for hot reloading and faster development.
#
# Usage:
#   docker compose -f compose.dev.yml up -d
#   docker compose -f compose.dev.yml down
#
# Then in separate terminals:
#   npm run dev:api    (Terminal 1)
#   npm run dev:web    (Terminal 2)

version: '3.8'

networks:
  flowpig-dev:
    driver: bridge

volumes:
  postgres_dev_data:
  redis_dev_data:

services:
  # ----------------------------------------
  # PostgreSQL 17 for Development
  # ----------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: flowpig-postgres-dev
    restart: unless-stopped
    networks:
      - flowpig-dev
    ports:
      - "5432:5432"  # Exposed for local dev access
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: flowpig
      POSTGRES_PASSWORD: flowpig_dev_password
      POSTGRES_DB: flowpig_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowpig -d flowpig_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Development resource limits (very light)
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ----------------------------------------
  # Redis for Development
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: flowpig-redis-dev
    restart: unless-stopped
    networks:
      - flowpig-dev
    ports:
      - "6379:6379"  # Exposed for local dev access
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ----------------------------------------
  # Optional: pgAdmin for database management
  # ----------------------------------------
  # Uncomment if you want a web UI for Postgres
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: flowpig-pgadmin-dev
