# ============================================
# Production Docker Compose Configuration
# ============================================
# This file sets up the complete production environment:
# - PostgreSQL 17 (database)
# - Redis (caching/sessions - optional but ready)
# - API (Fastify backend)
# - Web (Nginx frontend)
#
# Usage:
#   docker compose -f compose.prod.yml up -d
#   docker compose -f compose.prod.yml down
#
# Environment variables should be in .env.prod file

version: '3.8'

# ============================================
# NETWORKS
# ============================================
networks:
  flowpig-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ============================================
# VOLUMES (Persistent Data)
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

# ============================================
# SERVICES
# ============================================
services:
  # ----------------------------------------
  # PostgreSQL Database
  # ----------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: flowpig-postgres
    restart: unless-stopped
    networks:
      - flowpig-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flowpig}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-flowpig_prod}
      PGDATA: /var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flowpig} -d ${POSTGRES_DB:-flowpig_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ----------------------------------------
  # Redis (for caching, sessions, queues)
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: flowpig-redis
    restart: unless-stopped
    networks:
      - flowpig-network
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ----------------------------------------
  # API Service (Fastify Backend)
  # ----------------------------------------
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: flowpig-api
    restart: unless-stopped
    networks:
      - flowpig-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/data/uploads
    environment:
      # Core
      NODE_ENV: production
      PORT: 3001
      
      # URLs
      APP_URL: ${APP_URL:-https://app.flowpig.dev}
      API_URL: ${API_URL:-https://api.flowpig.dev}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://api.flowpig.dev}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      
      # Database (internal Docker networking)
      DATABASE_URL: postgresql://${POSTGRES_USER:-flowpig}:${POSTGRES_PASSWORD:-changeme_strong_password}@postgres:5432/${POSTGRES_DB:-flowpig_prod}
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Auth
      AUTH_SECRET: ${AUTH_SECRET}
      
      # Storage
      STORAGE_DRIVER: ${STORAGE_DRIVER:-filesystem}
      UPLOAD_ROOT: /app/data/uploads
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      
      # AI Providers (optional)
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_API_KEY: ${AI_API_KEY}
      AI_API_URL: ${AI_API_URL}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      
      # OAuth (optional)
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    # For Dokploy/Traefik integration - do NOT expose ports publicly
    # Traefik will route by domain name
    # ports:
    #   - "3001:3001"  # Only for debugging, remove in production with reverse proxy

  # ----------------------------------------
  # Web Service (Nginx Frontend)
  # ----------------------------------------
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    container_name: flowpig-web
    restart: unless-stopped
    networks:
      - flowpig-network
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    # For Dokploy/Traefik integration - do NOT expose ports publicly
    # Traefik will route by domain name
    # ports:
    #   - "80:80"  # Only for debugging, remove in production with reverse proxy
