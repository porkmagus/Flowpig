# ============================================
# Production Docker Compose Configuration
# ============================================
# Full stack: PostgreSQL, Redis, API, Web
#
# Usage:
#   docker compose -f compose.prod.yml up -d
#   docker compose -f compose.prod.yml logs -f
#   docker compose -f compose.prod.yml down

version: '3.8'

networks:
  flowpig-prod:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:

services:
  # ----------------------------------------
  # PostgreSQL Database
  # ----------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: flowpig-postgres-prod
    restart: always
    networks:
      - flowpig-prod
    environment:
      POSTGRES_USER: ${DB_USER:-flowpig}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-flowpig_prod}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-flowpig} -d ${DB_NAME:-flowpig_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    security_opt:
      - no-new-privileges:true

  # ----------------------------------------
  # Redis Cache & Session Store
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: flowpig-redis-prod
    restart: always
    networks:
      - flowpig-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ----------------------------------------
  # Fastify API Backend
  # ----------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: flowpig-api-prod
    restart: always
    networks:
      - flowpig-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-flowpig}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-flowpig_prod}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:3001}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-filesystem}
      UPLOAD_ROOT: ${UPLOAD_ROOT:-/app/data/uploads}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      AI_API_KEY: ${AI_API_KEY}
      AI_API_URL: ${AI_API_URL}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./data/uploads:/app/data/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only_root_filesystem: false  # Needs write access for uploads

  # ----------------------------------------
  # React Router Web Frontend
  # ----------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_WS_URL: ${VITE_WS_URL}
    container_name: flowpig-web-prod
    restart: always
    networks:
      - flowpig-prod
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    read_only_root_filesystem: true

  # ----------------------------------------
  # Optional: Nginx Reverse Proxy
  # ----------------------------------------
  # Uncomment if you want centralized routing (recommended for prod)
  # nginx:
  #   image: nginx:alpine
  #   container_name: flowpig-nginx
